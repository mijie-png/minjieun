<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>대전한빛고 1학년 8반</title>

<style>

body{
margin:0;
font-family: "Noto Sans KR", sans-serif;
background:#f5f7fb;
}

/* 상단 */
.topbar{
background:#0B1B3B;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar button{
background:#25a25a;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
}

/* 탭 */

.tabs{
display:flex;
background:white;
border-bottom:1px solid #ddd;
}

.tab{
flex:1;
padding:14px;
border:none;
background:white;
font-weight:bold;
}

.tab.active{
border-bottom:3px solid #25a25a;
color:#25a25a;
}

/* 페이지 */

.panel{
display:none;
padding:20px;
}

.panel.active{
display:block;
}

/* 카드 */

.card{
background:white;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* 프로필 */

.profile{
display:flex;
gap:15px;
align-items:center;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
}

.tag{
background:#eef2ff;
padding:3px 8px;
border-radius:5px;
font-size:12px;
margin-right:5px;
}

.btn{
display:block;
text-align:center;
padding:14px;
background:#25a25a;
color:white;
border-radius:8px;
margin-top:10px;
text-decoration:none;
}

</style>
</head>

<body>

<header class="topbar">
<div>대전한빛고 1학년 8반</div>
<button onclick="location.href='tel:01000000000'">
긴급연락
</button>
</header>


<!-- 탭 -->

<div class="tabs">

<button class="tab active" onclick="openTab('t1',this)">
우리반
</button>

<button class="tab" onclick="openTab('t2',this)">
선생님
</button>

<button class="tab" onclick="openTab('t3',this)">
질문방
</button>

</div>


<!-- 우리반 -->

<div id="t1" class="panel active">

<div class="card">

<h3>우리반 소개</h3>

<p>
자부심을 바탕으로 끊임없이 성장하는
대전한빛고 1학년 8반입니다.
</p>

</div>


<div class="card">

<h3>공지사항</h3>

<ul>

<li>3월 반장선거</li>

<li>체육대회 준비</li>

<li>중간고사 일정</li>

</ul>

</div>

</div>


<!-- 선생님 -->

<div id="t2" class="panel">

<div class="card">

<h3>담임 선생님</h3>

<div class="profile">

<img src="assets/boss.jpg">

<div>

<b>○○○ 선생님</b>

<div>

<span class="tag">영어</span>
<span class="tag">유머</span>
<span class="tag">친절</span>

</div>

</div>

</div>

</div>

</div>


<!-- 질문방 -->

<div id="t3" class="panel">

<div class="card">

<h3>익명 질문방</h3>

<p>

친구들이 궁금한 것들을
익명으로 질문할 수 있습니다.

</p>

<a class="btn" href="#">
QR 질문방 열기
</a>

</div>

</div>


<script>

function openTab(id,btn){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

btn.classList.add("active")

}

</script>

</body>
</html>
